<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - CSE 63B Portal</title>
    
    <link rel="apple-touch-icon" sizes="180x180" href="/class-logo/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/class-logo/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/class-logo/favicon-16x16.png">
    <link rel="manifest" href="/class-logo/site.webmanifest">
    <link rel="icon" href="/class-logo/favicon.ico">

    <!-- Firebase SDK (compat for CDN usage) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        .dashboard-card {
            transition: all 0.3s ease;
        }

        .dashboard-card:hover {
            transform: translateY(-5px);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-up {
            animation: slideUp 0.3s ease-out;
        }

        .section-btn.active {
            background-color: #2563eb;
            color: white;
        }

        .toast-slide-up {
            animation: slideUp 0.3s ease-out;
        }

        .chevron-icon {
            transition: transform 0.2s ease;
        }

        .rotate-180 {
            transform: rotate(180deg);
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">

    <!-- Toast Notification -->
    <div id="toast" class="hidden fixed top-4 right-4 z-[9999] max-w-sm slide-up">
        <div class="bg-white rounded-lg shadow-2xl border-l-4 p-4">
            <div class="flex items-center gap-3">
                <div id="toast-icon" class="flex-shrink-0 text-lg"></div>
                <div>
                    <p id="toast-message" class="font-semibold text-gray-800"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="hidden fixed inset-0 bg-white bg-opacity-90 z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4">
            </div>
            <p class="text-gray-600 font-medium">Loading...</p>
        </div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen"
        class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 to-purple-700 p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md slide-up">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                        </path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">Admin Login</h1>
                <p class="text-gray-500 mt-2">CSE 63B Portal Dashboard</p>
            </div>

            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input type="email" id="login-email" placeholder="admin@example.com" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
                <div id="login-error" class="hidden text-red-600 text-sm text-center bg-red-50 p-3 rounded-lg"></div>
                <div id="lockout-message" class="hidden text-orange-600 text-sm text-center bg-orange-50 p-3 rounded-lg font-semibold"></div>
                <button type="submit"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
                    Sign In
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="index.html" class="text-blue-600 hover:text-blue-800 text-sm font-medium">← Back to Portal</a>
            </div>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-dashboard" class="hidden">
        <!-- Header -->
        <header class="bg-white shadow-md sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                                </path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            </svg>
                        </div>
                        <h1 class="text-xl font-bold text-gray-800">Admin Dashboard</h1>
                    </div>
                    <div class="flex items-center gap-3">
                        <a href="index.html"
                            class="hidden sm:flex items-center gap-2 text-blue-600 hover:text-blue-800 font-medium text-sm transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14">
                                </path>
                            </svg>
                            View Portal
                        </a>
                        <span id="admin-email" class="hidden sm:block text-sm text-gray-500"></span>
                        <button id="logout-btn"
                            class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
                            Logout
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Dashboard Stats -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">
                <div class="dashboard-card bg-white rounded-xl shadow-md p-4 text-center">
                    <div class="text-2xl font-bold text-blue-600" id="stat-calendar">0</div>
                    <div class="text-xs text-gray-500 mt-1">Calendar</div>
                </div>
                <div class="dashboard-card bg-white rounded-xl shadow-md p-4 text-center">
                    <div class="text-2xl font-bold text-green-600" id="stat-announcements">0</div>
                    <div class="text-xs text-gray-500 mt-1">Announcements</div>
                </div>
                <div class="dashboard-card bg-white rounded-xl shadow-md p-4 text-center">
                    <div class="text-2xl font-bold text-purple-600" id="stat-assignments">0</div>
                    <div class="text-xs text-gray-500 mt-1">Assignments</div>
                </div>
                <div class="dashboard-card bg-white rounded-xl shadow-md p-4 text-center">
                    <div class="text-2xl font-bold text-orange-600" id="stat-subjects">0</div>
                    <div class="text-xs text-gray-500 mt-1">Subjects</div>
                </div>
                <div class="dashboard-card bg-white rounded-xl shadow-md p-4 text-center">
                    <div class="text-2xl font-bold text-red-600" id="stat-schedule">0</div>
                    <div class="text-xs text-gray-500 mt-1">Schedule</div>
                </div>
                <div class="dashboard-card bg-white rounded-xl shadow-md p-4 text-center">
                    <div class="text-2xl font-bold text-cyan-600" id="stat-contacts">0</div>
                    <div class="text-xs text-gray-500 mt-1">Contacts</div>
                </div>
            </div>

            <!-- Section Navigation -->
            <div class="flex flex-wrap gap-2 mb-6">
                <button class="section-btn active px-4 py-2 rounded-lg font-medium text-sm transition"
                    data-section="calendar">📅 Calendar</button>
                <button
                    class="section-btn px-4 py-2 rounded-lg font-medium text-sm bg-gray-200 text-gray-700 hover:bg-gray-300 transition"
                    data-section="announcements">📢 Announcements</button>
                <button
                    class="section-btn px-4 py-2 rounded-lg font-medium text-sm bg-gray-200 text-gray-700 hover:bg-gray-300 transition"
                    data-section="assignments">📝 Assignments</button>
                <button
                    class="section-btn px-4 py-2 rounded-lg font-medium text-sm bg-gray-200 text-gray-700 hover:bg-gray-300 transition"
                    data-section="subjects">📚 Subjects</button>
                <button
                    class="section-btn px-4 py-2 rounded-lg font-medium text-sm bg-gray-200 text-gray-700 hover:bg-gray-300 transition"
                    data-section="schedule">🕐 Schedule</button>
                <button
                    class="section-btn px-4 py-2 rounded-lg font-medium text-sm bg-gray-200 text-gray-700 hover:bg-gray-300 transition"
                    data-section="contacts">👥 Contacts</button>
            </div>

            <!-- Content Area -->
            <div class="bg-white rounded-xl shadow-lg p-4 sm:p-6">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                    <h2 id="section-title" class="text-xl font-bold text-gray-800">📅 Calendar Events</h2>
                    <div class="flex items-center gap-3 w-full sm:w-auto">
                        <button id="sync-courses-btn" onclick="syncClassroomCourses()" style="display: none;"
                            class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2 hover:shadow">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                            </svg>
                            Sync GCR Courses
                        </button>
                        <button id="add-new-btn" onclick="openEditor()"
                            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium text-sm transition flex items-center gap-2 whitespace-nowrap">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4">
                                </path>
                            </svg>
                            Add New
                        </button>
                    </div>
                </div>

                <div id="data-container" class="space-y-4">
                    <!-- Data items loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bulk Action Bar (Task 12) -->
    <div id="bulk-action-bar" class="hidden fixed bottom-6 left-1/2 transform -translate-x-1/2 z-40 bg-gray-800 text-white rounded-xl shadow-2xl px-6 py-3 flex items-center gap-4 slide-up">
        <span id="bulk-count" class="text-sm font-medium">0 selected</span>
        <button onclick="archiveItems()" class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">📦 Archive</button>
        <button onclick="bulkDelete()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">🗑️ Delete</button>
    </div>
    <!-- Editor Overlay -->
    <div id="editor-overlay"
        class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto slide-up">
            <div class="flex justify-between items-center border-b p-6">
                <h3 id="editor-title" class="text-xl font-bold text-gray-800">Add New Item</h3>
                <button onclick="closeEditor()" class="text-gray-500 hover:text-gray-800 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <form id="editor-form" class="p-6 space-y-4" onsubmit="event.preventDefault(); saveItem();">
                <div id="form-fields">
                    <!-- Dynamic form fields -->
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="submit"
                        class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition">Save</button>
                    <button type="button" onclick="closeEditor()"
                        class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 py-3 rounded-lg font-semibold transition">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Load Firebase client, then admin logic -->
    <script src="firebaseClient.js"></script>
    <script src="admin.js"></script>
</body>

</html>
